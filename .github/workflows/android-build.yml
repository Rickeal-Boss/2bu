name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "=== Checking required files ==="
          MISSING=0
          for f in settings.gradle build.gradle gradlew gradle.properties app/build.gradle; do
            if test -f "$f"; then echo "  ✅ $f"; else echo "  ❌ MISSING: $f"; MISSING=1; fi
          done
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "🚨 FATAL: Required files missing. Please commit ALL project files:"
            echo "   git add build.gradle app/"
            echo "   git commit -m 'Add app source code and root build.gradle'"
            echo "   git push"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: device-info-viewer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: device-info-viewer-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
